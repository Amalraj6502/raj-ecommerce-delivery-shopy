<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Login — ShopX</title>
<link rel="stylesheet" href="/admin/css/admin.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body style="display:block">
<div class="admin-login">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:2rem">
      <div style="font-size:3rem;margin-bottom:.5rem">🔧</div>
      <div class="logo" style="font-size:2rem;font-weight:800;background:linear-gradient(135deg,#7c3aed,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent">ShopX Admin</div>
      <p style="color:var(--text2);margin-top:.5rem;font-size:.9rem">Secure admin access only</p>
    </div>
    <div class="form-group"><label>Admin Email</label><input type="email" id="email" placeholder="admin@shopx.com" value="admin@shopx.com"></div>
    <div class="form-group"><label>Password</label>
      <div style="position:relative">
        <input type="password" id="password" placeholder="••••••••" value="Admin@123" style="padding-right:2.5rem">
        <button onclick="togglePwd()" style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text2);cursor:pointer"><i class="fa fa-eye" id="eyeIcon"></i></button>
      </div>
    </div>
    <button class="btn btn-primary" style="width:100%;padding:.85rem;font-size:1rem;margin-top:.5rem;justify-content:center" onclick="doLogin()" id="loginBtn">
      <i class="fa fa-shield-alt"></i> Login to Dashboard
    </button>
    <p style="text-align:center;margin-top:1.2rem;font-size:.82rem;color:var(--text2)">
      <a href="/" style="color:var(--accent2);text-decoration:none"><i class="fa fa-arrow-left"></i> Back to Store</a>
    </p>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>
<script>
function getToken() { return localStorage.getItem('shopx_token'); }
function setAuth(t,u) { localStorage.setItem('shopx_token',t); localStorage.setItem('shopx_user',JSON.stringify(u)); }

// Redirect if already admin
const tok = getToken();
if (tok) {
  try {
    const u = JSON.parse(localStorage.getItem('shopx_user'));
    if (u && u.is_admin) location.href = '/admin/dashboard.html';
  } catch {}
}

function togglePwd() {
  const inp = document.getElementById('password');
  const icon = document.getElementById('eyeIcon');
  if (inp.type === 'password') { inp.type = 'text'; icon.className = 'fa fa-eye-slash'; }
  else { inp.type = 'password'; icon.className = 'fa fa-eye'; }
}

function showToast(msg, type='error') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${type==='success'?'✅':'❌'}</span><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) { showToast('Please fill all fields'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Authenticating...';
  try {
    const res = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email,password}) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    if (!data.user.is_admin) throw new Error('Not an admin account');
    setAuth(data.token, data.user);
    showToast('Welcome back, Admin! 🎉', 'success');
    setTimeout(() => location.href = '/admin/dashboard.html', 1000);
  } catch(err) {
    showToast(err.message);
    btn.disabled = false; btn.innerHTML = '<i class="fa fa-shield-alt"></i> Login to Dashboard';
  }
}
document.addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
