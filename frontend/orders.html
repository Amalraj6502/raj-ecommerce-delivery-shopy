<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>My Orders — ShopX</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<nav class="navbar">
  <a href="/" class="logo">Shop<span style="color:#ec4899">X</span></a>
  <ul class="nav-links"><li><a href="/">Home</a></li><li><a href="/#products">Products</a></li><li><a href="/orders.html" style="color:var(--accent2)">My Orders</a></li></ul>
  <div class="nav-actions">
    <button class="btn btn-outline cart-btn" onclick="location.href='/'"><i class="fa fa-shopping-bag"></i></button>
    <button class="btn btn-primary" onclick="logout()"><i class="fa fa-sign-out-alt"></i> Logout</button>
  </div>
</nav>

<div class="orders-page">
  <div class="container">
    <div class="section-header" style="text-align:left;margin-bottom:2rem">
      <div class="tag">Track</div>
      <h2>My Orders</h2>
      <p style="color:var(--text2)">View and track all your orders</p>
    </div>
    <div id="ordersContainer">
      <div style="text-align:center;padding:3rem;color:var(--text2)"><i class="fa fa-spinner fa-spin" style="font-size:2rem"></i><p style="margin-top:1rem">Loading orders...</p></div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="/js/auth.js"></script>
<script>
if (!getToken()) { location.href = '/login.html'; }

const STATUS_STEPS = ['Pending','Processing','Shipped','Delivered'];

async function loadOrders() {
  try {
    const res = await fetch('/api/orders/my', { headers: { Authorization: `Bearer ${getToken()}` } });
    if (res.status === 401) { clearAuth(); location.href = '/login.html'; return; }
    const orders = await res.json();
    const container = document.getElementById('ordersContainer');

    if (!orders.length) {
      container.innerHTML = `<div style="text-align:center;padding:5rem;color:var(--text2)">
        <div style="font-size:4rem">📦</div>
        <h3 style="margin:1rem 0">No orders yet</h3>
        <p>Start shopping to see your orders here</p>
        <a href="/" class="btn btn-primary" style="margin-top:1.5rem;display:inline-flex">Shop Now</a>
      </div>`;
      return;
    }

    container.innerHTML = orders.map(order => {
      const stepIdx = STATUS_STEPS.indexOf(order.status);
      const steps = STATUS_STEPS.map((s, i) => `
        <div style="display:flex;flex-direction:column;align-items:center;flex:1">
          <div style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;background:${i <= stepIdx ? 'var(--accent)' : 'var(--bg3)'};border:2px solid ${i <= stepIdx ? 'var(--accent2)' : 'var(--border)'}">
            ${i < stepIdx ? '✓' : i + 1}
          </div>
          <div style="font-size:.72rem;margin-top:.3rem;color:${i <= stepIdx ? 'var(--accent2)' : 'var(--text2)'}">${s}</div>
        </div>
        ${i < STATUS_STEPS.length - 1 ? `<div style="flex:1;height:2px;margin-top:15px;background:${i < stepIdx ? 'var(--accent)' : 'var(--border)'}"></div>` : ''}
      `).join('');

      return `
        <div class="order-card">
          <div class="order-header">
            <div>
              <div class="order-id">Order #${order.id}</div>
              <div class="order-date">${new Date(order.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}</div>
            </div>
            <div style="text-align:right">
              <span class="status-badge status-${order.status}">${order.status}</span>
              <div class="order-total" style="margin-top:.4rem">₹${order.total.toLocaleString('en-IN')}</div>
            </div>
          </div>
          ${order.status !== 'Cancelled' ? `<div style="display:flex;align-items:center;margin:1.2rem 0">${steps}</div>` : ''}
          <div style="background:var(--bg3);border-radius:10px;padding:1rem;margin-top:.5rem">
            <div style="font-size:.82rem;color:var(--text2);margin-bottom:.5rem">Items (${order.items.length})</div>
            ${order.items.map(item => `
              <div style="display:flex;align-items:center;gap:.8rem;padding:.4rem 0;border-bottom:1px solid var(--border)">
                <div style="width:40px;height:40px;border-radius:6px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:1.2rem;overflow:hidden">
                  <img src="/uploads/${item.image}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.textContent='🛍️'">
                </div>
                <div style="flex:1">
                  <div style="font-size:.88rem;font-weight:600">${item.name}</div>
                  <div style="font-size:.78rem;color:var(--text2)">Qty: ${item.quantity}</div>
                </div>
                <div style="font-weight:700;color:var(--accent2)">₹${(item.price * item.quantity).toLocaleString('en-IN')}</div>
              </div>
            `).join('')}
          </div>
          <div style="margin-top:.75rem;font-size:.82rem;color:var(--text2)">
            📍 ${order.shipping_address}, ${order.shipping_city} &nbsp;|&nbsp; 💳 ${order.payment_method}
          </div>
        </div>
      `;
    }).join('');
  } catch(e) {
    document.getElementById('ordersContainer').innerHTML = `<div style="text-align:center;padding:3rem;color:var(--danger)">Failed to load orders. <a href="#" onclick="loadOrders()" style="color:var(--accent2)">Retry</a></div>`;
  }
}

loadOrders();
</script>
</body>
</html>
